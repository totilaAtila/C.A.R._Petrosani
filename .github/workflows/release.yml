name: Build & Release Windows

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versiune release (ex: v1.2.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Pre-release?'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout cod
      uses: actions/checkout@v4

    - name: Determinare versiune
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          VERSION="${GITHUB_REF#refs/tags/}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Versiune: $VERSION"

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalare dependențe Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Verificare module instalate
      run: |
        python -c "
        import sys
        modules = ['xlsxwriter', 'reportlab', 'PyQt5', 'PIL', 'dbf', 'pyzipper']
        errors = []
        for m in modules:
            try:
                __import__(m)
                print(f'OK  {m}')
            except ImportError as e:
                print(f'ERR {m}: {e}')
                errors.append(m)
        if errors:
            sys.exit(1)
        print('Toate modulele OK')
        "

    - name: Build executabil Windows (onefile)
      run: |
        pyinstaller --noconfirm --onefile --windowed `
          --icon "pol.ico" `
          --name "CARpetrosani" `
          --add-data "fonts;fonts" `
          --add-data "Icons;Icons" `
          --add-data "ui;ui" `
          --add-data "Arial.ttf;." `
          --add-data "DejaVuBoldSans.ttf;." `
          --add-data "DejaVuSans.ttf;." `
          --add-data "DejaVuSans-Bold.ttf;." `
          --hidden-import xlsxwriter `
          --hidden-import xlsxwriter.workbook `
          --hidden-import xlsxwriter.worksheet `
          --hidden-import reportlab `
          --hidden-import reportlab.lib `
          --hidden-import reportlab.lib.colors `
          --hidden-import reportlab.lib.pagesizes `
          --hidden-import reportlab.lib.units `
          --hidden-import reportlab.pdfgen `
          --hidden-import reportlab.pdfgen.canvas `
          --hidden-import reportlab.pdfbase `
          --hidden-import reportlab.pdfbase.pdfmetrics `
          --hidden-import reportlab.pdfbase.ttfonts `
          --hidden-import et_xmlfile `
          --hidden-import ssl `
          --hidden-import decimal `
          --hidden-import dbf `
          --hidden-import pyzipper `
          --hidden-import zipfile `
          --hidden-import security_manager `
          --hidden-import dialog_styles `
          --hidden-import currency_logic `
          --hidden-import Cryptodome `
          --hidden-import Cryptodome.Cipher `
          --hidden-import Cryptodome.Cipher.AES `
          main.py

    - name: Verificare executabil generat
      shell: bash
      run: |
        if [ ! -f "dist/CARpetrosani.exe" ]; then
          echo "EROARE: CARpetrosani.exe nu a fost generat!"
          ls -la dist/ || echo "dist/ nu există"
          exit 1
        fi
        echo "OK - CARpetrosani.exe generat"
        ls -lh dist/CARpetrosani.exe

    - name: Creare pachet de distribuție
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        FOLDER="CARpetrosani-$VERSION"

        mkdir -p "$FOLDER"

        # Executabilul principal
        cp dist/CARpetrosani.exe "$FOLDER/"

        # Fișiere de configurare externe (citite la runtime lângă .exe)
        cp config_dobanda.json           "$FOLDER/"
        cp conversie_config.json         "$FOLDER/"
        cp imprumuturi_noi_config.json   "$FOLDER/"
        cp imprumuturi_noi_prima_rata.json "$FOLDER/"
        cp theme_settings.json           "$FOLDER/"

        # Icoane (pentru bara de taskbar și shortcut-uri)
        cp pol.ico   "$FOLDER/"
        cp money.ico "$FOLDER/"

        echo "Conținut pachet:"
        ls -lh "$FOLDER/"

    - name: Creare arhivă ZIP
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        FOLDER="CARpetrosani-$VERSION"
        ZIP="CARpetrosani-$VERSION-Windows.zip"

        powershell -Command "Compress-Archive -Path '$FOLDER' -DestinationPath '$ZIP' -Force"

        echo "Arhivă creată: $ZIP"
        ls -lh "$ZIP"

    - name: Creare GitHub Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        ZIP="CARpetrosani-$VERSION-Windows.zip"
        PRERELEASE="${{ github.event.inputs.prerelease }}"

        PRERELEASE_FLAG=""
        if [ "$PRERELEASE" = "true" ]; then
          PRERELEASE_FLAG="--prerelease"
        fi

        gh release create "$VERSION" \
          "$ZIP" \
          --title "CARpetrosani $VERSION" \
          --notes "## CARpetrosani $VERSION — Windows

### Instalare
1. Descărcați \`CARpetrosani-$VERSION-Windows.zip\`
2. Dezarhivați dosarul în locația dorită (ex: \`C:\\CARpetrosani\\\`)
3. Rulați \`CARpetrosani.exe\`

### Conținut arhivă
\`\`\`
CARpetrosani-$VERSION/
├── CARpetrosani.exe              ← aplicația
├── config_dobanda.json           ← configurare rată dobândă
├── conversie_config.json         ← configurare conversie EUR
├── imprumuturi_noi_config.json   ← configurare împrumuturi
├── imprumuturi_noi_prima_rata.json
├── theme_settings.json           ← configurare temă vizuală
├── pol.ico
└── money.ico
\`\`\`

> **Notă:** Bazele de date (\`.db\`) nu sunt incluse — acestea rămân pe calculatorul utilizatorului.
" \
          $PRERELEASE_FLAG

        echo "Release $VERSION creat: https://github.com/${{ github.repository }}/releases/tag/$VERSION"
